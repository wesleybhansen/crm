map $uri $crm_x_frame_options {
    ~^/api/(forms|surveys)/public/[a-z0-9-]+/?$ "";
    default "DENY";
}

map $host $crm_hsts {
    hostnames;
    default "";
    .noliai.com "max-age=31536000";
    .thelaunchpadincubator.com "max-age=31536000";
}

server {
    listen 80;
    server_name crm.thelaunchpadincubator.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name crm.thelaunchpadincubator.com;

    ssl_certificate /etc/letsencrypt/live/crm.thelaunchpadincubator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.thelaunchpadincubator.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Normalize HSTS at the TLS edge, including nginx-generated auth failures,
    # for Noli-owned hosts only. This virtual host also serves customer-owned
    # landing-page domains, whose future HTTP policy Noli must not constrain.
    add_header Strict-Transport-Security $crm_hsts always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header X-Frame-Options $crm_x_frame_options always;

    # External MCP (Model Context Protocol) streamable-HTTP endpoint.
    # Routed to the dedicated `mcp` container on port 3001. The MCP server
    # enforces x-api-key itself, and we reject empty keys at the edge to
    # avoid pointless upstream hits.
    location /mcp {
        if ($http_x_api_key = "") {
            return 401 '{"error":"x-api-key header required"}';
        }

        proxy_pass http://mcp:3001;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header X-Frame-Options;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Streamable HTTP / SSE: keep sockets open and don't buffer
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header X-Frame-Options;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    client_max_body_size 20M;
}
