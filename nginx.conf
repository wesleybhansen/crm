server {
    listen 80;
    server_name crm.thelaunchpadincubator.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name crm.thelaunchpadincubator.com;

    ssl_certificate /etc/letsencrypt/live/crm.thelaunchpadincubator.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.thelaunchpadincubator.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # External MCP (Model Context Protocol) streamable-HTTP endpoint.
    # Routed to the dedicated `mcp` container on port 3001. The MCP server
    # enforces x-api-key itself, and we reject empty keys at the edge to
    # avoid pointless upstream hits.
    location /mcp {
        if ($http_x_api_key = "") {
            return 401 '{"error":"x-api-key header required"}';
        }

        proxy_pass http://mcp:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Streamable HTTP / SSE: keep sockets open and don't buffer
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    client_max_body_size 20M;
}
