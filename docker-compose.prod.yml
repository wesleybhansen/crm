services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: launchos-app
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_prod_2026}@postgres:5432/${POSTGRES_DB:-crm}
    working_dir: /app/apps/mercato
    command: ["sh", "-c", "cp .mercato/next/standalone/apps/mercato/server.js .mercato/next/standalone/apps/mercato/server.cjs && node .mercato/next/standalone/apps/mercato/server.cjs"]
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/apps/mercato/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - launchos-network

  mcp:
    # External MCP HTTPS endpoint (SPEC-062 Phase 3). Runs the same image
    # as `app` but swaps the command to the MCP streamable-HTTP server.
    # Nginx fronts this service at /mcp; no host port exposure.
    image: open-mercato-app
    container_name: launchos-mcp
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_prod_2026}@postgres:5432/${POSTGRES_DB:-crm}
    working_dir: /app/apps/mercato
    command: ["node", "/app/packages/cli/bin/mercato", "ai_assistant", "mcp:serve-http", "--port", "3001"]
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - launchos-network

  postgres:
    image: pgvector/pgvector:pg17-trixie
    container_name: launchos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_prod_2026}
      POSTGRES_DB: ${POSTGRES_DB:-crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup-tables.sql:/docker-entrypoint-initdb.d/setup-tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - launchos-network

  nginx:
    image: nginx:alpine
    container_name: launchos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - launchos-network

  certbot:
    image: certbot/certbot
    container_name: launchos-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
    name: launchos-postgres-data
  uploads_data:
    name: launchos-uploads-data

networks:
  launchos-network:
    name: launchos-network
    driver: bridge
